<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإيصال</title>
    <link rel="stylesheet" href="./css/receipt.css">
    <script src="./js/auth-wrapper.js"></script>
</head>
<body>

    <div id="receipt-container">
        <h2 id="store-name">Vortex POS</h2>
        <h1 id="order-id-large">#0000</h1>
        
        <div class="header-info-grid">
            <div class="info-row">
                <div class="right-col">
                    <span class="label">العميل:</span>
                    <span id="customer-name" class="value"></span>
                </div>
                <div class="left-col">
                    <span class="label">التاريخ:</span>
                    <span id="order-date" class="value"></span>
                </div>
            </div>
            <div class="info-row">
                <div class="right-col">
                    <span class="label">الهاتف:</span>
                    <span id="customer-phone" class="value"></span>
                </div>
                <div class="left-col">
                    <span class="label">العنوان:</span>
                    <span id="customer-address" class="value"></span>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>الصنف</th>
                    <th style="text-align: center;">الكمية</th>
                    <th style="text-align: left;">السعر</th>
                </tr>
            </thead>
            <tbody id="order-details"></tbody>
        </table>
        <div class="totalBox">
            <p>الإجمالي الفرعي: <span id="subtotal"></span></p>
            <p>خدمة التوصيل: <span id="delivery-price"></span></p>
            <p id="discount-container">الخصم: <span id="discount"></span></p>
            <p class="grand-total">الإجمالي الكلي: <span id="order-total"></span></p>
        </div>
        <div class="footer">
            <span><strong>رقم التواصل:</strong> <span id="store-phone-footer">--</span></span>
            <div>
                <span id="store-footer-msg">شكراً لزيارتكم! نرجو أن تكون تجربتكم سعيدة.</span>
            </div>
        </div>
    </div>

    <script src="./js/receipt.js"></script>

</body>
</html>
