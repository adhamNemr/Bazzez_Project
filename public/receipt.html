<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإيصال</title>
    <link rel="stylesheet" href="./css/receipt.css">
    <script src="./js/auth-wrapper.js"></script>
</head>
<body>

    <div id="receipt-container">
        <h2 id="store-name">دار الفاروق</h2>
        
        <div class="header-info-grid">
            <div class="info-row">
                <div class="right-col">
                    <span class="label">العميل:</span>
                    <span id="customer-name" class="value"></span>
                </div>
                <div class="left-col">
                    <span class="label">التاريخ:</span>
                    <span id="order-date" class="value"></span>
                </div>
            </div>
            <div class="info-row">
                <div class="right-col">
                    <span class="label">الهاتف:</span>
                    <span id="customer-phone" class="value"></span>
                </div>
                <div class="left-col">
                    <span class="label">رقم الأوردر:</span>
                    <span id="order-id-label" class="value"></span>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>الصنف</th>
                    <th style="text-align: center;">الكمية</th>
                    <th style="text-align: left;">السعر</th>
                </tr>
            </thead>
            <tbody id="order-details"></tbody>
        </table>
        <div class="totalBox">

            <p class="grand-total">الإجمالي : <span id="order-total"></span></p>
        </div>
        <div class="footer">
            <span><strong>رقم التواصل:</strong>
            <div>
                <span id="store-footer-msg"> 01055229252 - 0403314977
                    <br>
                    الأستبدال و الأسترجاع خلال ٧ ايام 
                    <br>
                    ما عدا المواسم و العروض استبدال فقط خلال ٣ ايام
                </span>
            </div>
        </div>
    </div>

    <script src="./js/receipt.js"></script>

</body>
</html>
