<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex POS - Cashier Workspace</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/cashier.css">
</head>
<body class="polaris-theme">
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-container"></div>

    <div class="main-content">
        <!-- 🛡️ Top Integrated Header (Customer Bar) -->
        <header class="customer-sub-header">
            <div class="customer-bar-container">
                <a href="/launcher.html" class="cashier-home-mini-btn" title="Back to Hub">
                    <i class="fas fa-th-large"></i>
                </a>
                <div class="input-group search-customer">
                    <i class="fas fa-user-plus"></i>
                    <input type="text" id="customer-name" placeholder="Search or add customer" autocomplete="off">
                </div>
                <div class="input-group customer-contact">
                    <i class="fas fa-phone"></i>
                    <input type="text" id="customer-phone" placeholder="Phone number" autocomplete="off">
                    <div id="suggestions" class="dropdown-list"></div>
                </div>
                <div class="input-group customer-delivery">
                    <i class="fas fa-truck"></i>
                    <select id="delivery-price">
                        <option value="0">Select Delivery Area</option>
                    </select>
                </div>
                <div class="input-group cashier-actions">
                     <span class="badge" style="background: #f1f5f9; color: var(--luxury-slate); border: 1px solid #e2e8f0;" id="activeUserBadge"><i class="fas fa-user-circle"></i> <span>Loading User...</span></span>
                </div>
            </div>
            <!-- Optional: hidden address field or expander if needed -->
            <input type="hidden" id="customer-address" value="Walk-in">
        </header>

        <main class="cashier-main">
            <!-- 🍔 Smart Grid (Products) -->
            <section class="smart-grid-section">
                <div class="payment-selector">
                    <button class="payment-btn active" data-method="cash" onclick="setPaymentMethod('cash')">
                        <i class="fas fa-money-bill-alt"></i> <span id="loc-cash">Cash</span>
                    </button>
                    <button class="payment-btn" data-method="card" onclick="setPaymentMethod('card')">
                        <i class="fas fa-credit-card"></i> <span id="loc-card">Card</span>
                    </button>
                    <button class="payment-btn" data-method="instapay" onclick="setPaymentMethod('instapay')">
                        <i class="fas fa-bolt"></i> <span id="loc-instapay">InstaPay</span>
                    </button>
                    <button class="payment-btn" data-method="vcash" onclick="setPaymentMethod('vcash')">
                        <i class="fas fa-mobile-alt"></i> <span id="loc-vcash">V-Cash</span>
                    </button>
                    <input type="hidden" id="payment-method" value="cash">
                </div>

                <!-- Category Tabs (Polaris Pills) -->
                 <nav class="category-nav">
                    <div id="category-pills" class="category-pills">
                        <button class="pill active" id="beef-btn" onclick="showMenu('beef')"><span id="loc-cat-beef">Beef Burgers</span></button>
                        <button class="pill" id="chicken-btn" onclick="showMenu('chicken')"><span id="loc-cat-chicken">Chicken</span></button>
                        <button class="pill" id="french-btn" onclick="showMenu('french')"><span id="loc-cat-french">French</span></button>
                        <button class="pill" id="combo-btn" onclick="showMenu('combo')"><span id="loc-cat-combo">Combos</span></button>
                        <button class="pill" id="addons-btn" onclick="showMenu('Add_ons')"><span id="loc-cat-addons">Add-ons</span></button>
                    </div>
                 </nav>

                 <!-- Product Grid -->
                 <div id="menu-items" class="product-grid"> 
                     <!-- Injected via JS -->
                 </div>
            </section>
            
            <!-- 🛒 Checkout Column (Shopify Cart) -->
            <aside class="checkout-aside">
                <div class="cart-card">
                    <div class="cart-header">
                        <h3 id="loc-cart-summary">Cart Summary</h3>
                        <span id="cart-count" class="badge">0 items</span>
                    </div>
                    
                    <div id="order-summary" class="cart-items-list">
                        <!-- Items injected here -->
                        <div class="empty-cart">
                            <i class="fas fa-shopping-basket"></i>
                            <p id="loc-empty-cart">Empty Cart</p>
                        </div>
                    </div>

                    <div class="cart-footer">
                        <div class="summary-line">
                            <span id="loc-subtotal">Subtotal</span>
                            <span id="subtotal-val">0 EGP</span>
                        </div>
                        <div class="summary-line">
                            <span id="loc-delivery">Delivery</span>
                            <span id="delivery-val">0 EGP</span>
                        </div>
                        <div class="summary-line total-line">
                            <span id="loc-total">Total</span>
                            <span id="order-total">0 EGP</span>
                        </div>
                        <button id="submit-order" class="btn btn-primary checkout-btn">
                            <span id="loc-checkout">Complete Checkout</span>
                        </button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Scripts -->
    <script src="./js/sidebar-loader.js"></script>
    <script>
        // --- 🌍 Localization Dictionary ---
        const translations = {
            en: {
                searchCustomer: "Search or add customer",
                phoneNumber: "Phone number",
                cash: "Cash",
                card: "Card",
                instapay: "InstaPay",
                vcash: "V-Cash",
                catBeef: "Beef Burgers",
                catChicken: "Chicken",
                catFrench: "French",
                catCombo: "Combos",
                catAddons: "Add-ons",
                cartSummary: "Cart Summary",
                emptyCart: "Empty Cart",
                subtotal: "Subtotal",
                delivery: "Delivery",
                total: "Total",
                checkout: "Complete Checkout",
                selectDelivery: "Select Delivery Area"
            },
            ar: {
                searchCustomer: "ابحث أو أضف عميل",
                phoneNumber: "رقم الهاتف",
                cash: "كاش",
                card: "فيزا / بطاقة",
                instapay: "إنستاباي",
                vcash: "فودافون كاش",
                catBeef: "برجر لحم",
                catChicken: "دجاج",
                catFrench: "فرينش",
                catCombo: "كومبو",
                catAddons: "إضافات",
                cartSummary: "ملخص السلة",
                emptyCart: "السلة فارغة",
                subtotal: "المجموع الفرعي",
                delivery: "التوصيل",
                total: "الإجمالي",
                checkout: "إتمام الطلب",
                selectDelivery: "اختر منطقة التوصيل"
            }
        };

        function applyLocalization() {
            const lang = localStorage.getItem('lang') || 'ar';
            const t = translations[lang];

            // Update Placeholders
            document.getElementById('customer-name').placeholder = t.searchCustomer;
            document.getElementById('customer-phone').placeholder = t.phoneNumber;
            
            // Update Text Nodes
            document.getElementById('loc-cash').textContent = t.cash;
            document.getElementById('loc-card').textContent = t.card;
            document.getElementById('loc-instapay').textContent = t.instapay;
            document.getElementById('loc-vcash').textContent = t.vcash;
            
            document.getElementById('loc-cat-beef').textContent = t.catBeef;
            document.getElementById('loc-cat-chicken').textContent = t.catChicken;
            document.getElementById('loc-cat-french').textContent = t.catFrench;
            document.getElementById('loc-cat-combo').textContent = t.catCombo;
            document.getElementById('loc-cat-addons').textContent = t.catAddons;
            
            document.getElementById('loc-cart-summary').textContent = t.cartSummary;
            document.getElementById('loc-empty-cart').textContent = t.emptyCart;
            document.getElementById('loc-subtotal').textContent = t.subtotal;
            document.getElementById('loc-delivery').textContent = t.delivery;
            document.getElementById('loc-total').textContent = t.total;
            document.getElementById('loc-checkout').textContent = t.checkout;

            // Delivery Select default option
            const deliverySelect = document.getElementById('delivery-price');
            if (deliverySelect && deliverySelect.options.length > 0) {
                deliverySelect.options[0].textContent = t.selectDelivery;
            }
        }

        // Run localization immediately
        applyLocalization();
    </script>
    <script src="./js/cashier.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
