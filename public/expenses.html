            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;

        @media (max-width: 768px) {
            .expenses-page { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-grid-2 { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <!-- 🏗️ Dynamic Premium Header -->
        <div id="header-container" data-title="إدارة المصروفات" data-icon="fa-receipt"></div>

        <div class="expenses-page">
            <!-- Header removed -->
            <!-- ===== Stats Grid ===== -->
            <div class="stats-grid">
                <!-- Today -->
                <div class="stat-card today">
                    <div class="stat-info">
                        <span class="stat-label">مصروفات الوردية</span>
                        <span class="stat-value" id="stat-today">---</span>
                        <span class="stat-sub">إجمالي صرف اليوم</span>
                    </div>
                    <div class="stat-icon-wrap"><i class="fas fa-wallet"></i></div>
                </div>

                <!-- Month -->
                <div class="stat-card month">
                    <div class="stat-info">
                        <span class="stat-label">مصروفات الشهر</span>
                        <span class="stat-value" id="stat-month">---</span>
                        <span class="stat-sub">إجمالي الشهر الحالي</span>
                    </div>
                    <div class="stat-icon-wrap"><i class="fas fa-calendar-alt"></i></div>
                </div>

                <!-- Cash -->
                <div class="stat-card cash-stat">
                    <div class="stat-info">
                        <span class="stat-label">دفع كاش</span>
                        <span class="stat-value" id="stat-cash">---</span>
                        <span class="stat-sub">مدفوع من الدرج</span>
                    </div>
                    <div class="stat-icon-wrap"><i class="fas fa-money-bill-wave"></i></div>
                </div>

                <!-- Digital -->
                <div class="stat-card digital-stat">
                    <div class="stat-info">
                        <span class="stat-label">دفع إلكتروني</span>
                        <span class="stat-value" id="stat-digital">---</span>
                        <span class="stat-sub">فيزا + محافظ رقمية</span>
                    </div>
                    <div class="stat-icon-wrap"><i class="fas fa-credit-card"></i></div>
                </div>
            </div>

            <!-- ===== Toolbar ===== -->
            <div class="toolbar">
                <div class="toolbar-top">
                    <div class="category-filter" id="cat-filter">
                        <button class="cat-pill active" data-cat="all">الكل</button>
                        <button class="cat-pill" data-cat="Supplies">خامات</button>
                        <button class="cat-pill" data-cat="Rent">إيجار</button>
                        <button class="cat-pill" data-cat="Utilities">مرافق</button>
                        <button class="cat-pill" data-cat="Salaries">رواتب</button>
                        <button class="cat-pill" data-cat="Maintenance">صيانة</button>
                        <button class="cat-pill" data-cat="Marketing">تسويق</button>
                        <button class="cat-pill" data-cat="Other">أخرى</button>
                    </div>
                </div>
                <div class="toolbar-bottom">
                    <!-- Right: Search + Add (RTL) -->
                    <div class="action-group-main">
                        <div class="search-group">
                            <i class="fas fa-search"></i>
                            <input type="text" id="expense-search" placeholder="بحث بالوصف، الملاحظات، أو الموظف...">
                        </div>

                    </div>

                    <!-- Left: Date Controls (RTL) -->
                    <div class="date-group-main">
                        <div class="date-filter-group">
                            <i class="fas fa-calendar"></i>
                            <input type="date" id="date-filter">
                        </div>
                        <button class="btn-today" id="btn-today" onclick="resetToBusinessDate()">
                            <i class="fas fa-sync-alt"></i> وردية اليوم
                        </button>
                                                <button class="btn-add-expense" id="btn-open-modal" onclick="openModal()">
                            <i class="fas fa-plus"></i>
                            تسجيل مصروف جديد
                        </button>
                    </div>
                </div>
            </div>

            <!-- ===== Table ===== -->
            <div class="table-wrapper">
                <table class="expenses-table">
                    <thead>
                        <!-- Title Row -->
                        <tr class="table-title-row">
                            <th colspan="7">
                                <div class="table-title">
                                    <i class="fas fa-list-ul" style="color:var(--primary)"></i>
                                    سجل المصروفات
                                    <span class="table-count" id="expenses-count">0</span>
                                </div>
                            </th>
                        </tr>
                        <!-- Header Row -->
                        <tr class="table-header-row-main">
                            <th style="width: 12%;">التاريخ</th>
                            <th style="width: 28%;">الوصف</th>
                            <th style="width: 12%;">الفئة</th>
                            <th style="width: 15%;">المبلغ</th>
                            <th style="width: 13%;">طريقة الدفع</th>
                            <th style="width: 10%;">بواسطة</th>
                            <th style="width: 10%;">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-table-body">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <i class="fas fa-spinner fa-spin" style="opacity:0.3;font-size:2rem;"></i>
                                    <p>جاري التحميل...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button class="btn-export" onclick="exportToExcel()">
               Excel
            </button>
        </div><!-- end expenses-page -->
    </div><!-- end main-content -->

    <!-- ===== Add / Edit Modal ===== -->
    <div class="modal-overlay" id="expense-modal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-receipt"></i>
                    <span id="modal-title-text">تسجيل مصروف جديد</span>
                </div>
                <button class="btn-close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="expense-form" novalidate>
                <div class="modal-body">
                    <div class="form-grid-2">
                        <div class="field-group form-grid-full">
                            <label class="field-label">الوصف <span style="color:var(--error)">*</span></label>
                            <input type="text" id="field-description" class="field-input" placeholder="مثلاً: شراء خامات، فاتورة كهرباء..." required>
                        </div>
                        <div class="field-group">
                            <label class="field-label">المبلغ (EGP) <span style="color:var(--error)">*</span></label>
                            <input type="text" id="field-amount" class="field-input" placeholder="0.00" required>
                        </div>
                        <div class="field-group">
                            <label class="field-label">الفئة <span style="color:var(--error)">*</span></label>
                            <select id="field-category" class="field-input">
                                <option value="Supplies">خامات ومشتريات</option>
                                <option value="Rent">إيجار</option>
                                <option value="Utilities">مرافق (كهرباء/مياه)</option>
                                <option value="Salaries">رواتب</option>
                                <option value="Maintenance">صيانة</option>
                                <option value="Marketing">تسويق وإعلان</option>
                                <option value="Other">أخرى</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label class="field-label">طريقة الدفع</label>
                            <select id="field-payment" class="field-input">
                                <option value="cash">💵 كاش (من الدرج)</option>
                                <option value="card">💳 فيزا / بطاقة</option>
                                <option value="vcash">📱 فودافون كاش</option>
                                <option value="instapay">⚡ إنستاباي</option>
                            </select>
                        </div>
                        <div class="field-group form-grid-full">
                            <label class="field-label">ملاحظات (اختياري)</label>
                            <input type="text" id="field-notes" class="field-input" placeholder="مثلاً: رقم الفاتورة، اسم المورد...">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel-modal" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn-submit-expense" id="btn-submit">
                        <i class="fas fa-check"></i>
                        <span id="submit-btn-text">تسجيل المصروف</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/sidebar-loader.js"></script>
    <script src="./js/header-loader.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/expenses.js"></script>
</body>
</html>
