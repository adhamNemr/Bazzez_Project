<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex POS - Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/common.css">
    <style>
        :root {
            --primary: #008060;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            overflow: hidden;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .hub-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5vh 2vw;
        }

        .hub-header {
            height: 8vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1vh;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: white;
            padding: 0.5rem 2rem;
            border-radius: 5rem;
            box-shadow: 0 0.25rem 1rem rgba(0,0,0,0.03);
        }

        .brand-container h1 {
            font-size: 1.5rem;
            letter-spacing: 0.1rem;
            color: #475569;
        }

        .brand-container h1 span { color: var(--primary); font-weight: 800; }

        .brand-divider {
            width: 0.0625rem;
            height: 1.5rem;
            background: #e2e8f0;
        }

        .hub-grid {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 1.25vh 1vw; /* Responsive gaps */
            width: 100%;
            max-width: 98vw;
            margin: 0 auto;
            animation: staggerIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes staggerIn {
            from { opacity: 0; transform: translateY(1.5vh); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hub-item {
            background: #ffffff;
            /* Force 5 columns for a balanced 5-5-5 layout */
            width: calc(20% - 1.5vw); 
            height: 26vh; 
            padding: 1.5vh 0.5rem;
            border-radius: 1.5rem;
            text-align: center;
            text-decoration: none;
            color: #1e293b;
            box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.03);
            border: 0.0625rem solid #f1f5f9;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8vh;
        }

        .icon-bg {
            width: clamp(4rem, 8vh, 8rem);
            height: clamp(4rem, 8vh, 8rem);
            background: #f8fafc;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .hub-item i {
            font-size: clamp(2rem, 3.5vh, 3rem);
            color: #475569;
            transition: all 0.4s ease;
        }

        .hub-item span {
            font-weight: 800;
            font-size: clamp(1.1rem, 1.2vh, 1.3rem);
            color: #1e293b;
            margin-top: 0.5vh;
            white-space: nowrap;
        }

        .hub-item:hover {
            transform: translateY(-0.3rem);
            box-shadow: 0 1rem 2rem rgba(0,0,0,0.06);
            border-color: var(--primary);
        }

        .hub-item:hover .icon-bg {
            background: rgba(0, 128, 96, 0.1);
            transform: rotate(5deg) scale(1.05);
        }

        .hub-item:hover i {
            color: var(--primary);
        }

        .hub-item.logout-tile:hover .icon-bg { background: rgba(220, 38, 38, 0.1); }
        .hub-item.logout-tile:hover i { color: #dc2626; }
        .hub-item.logout-tile { border-color: #fecaca; }
        .hub-item.logout-tile i { color: #dc2626; }
        .hub-item.logout-tile:hover { background: #fff5f5; border-color: #dc2626; }

        .disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

    <div class="hub-wrapper">
        <header class="hub-header">
            <div class="brand-container">
                <h1>VORTEX <span>POS</span></h1>
                <div class="brand-divider"></div>
                <img src="/img/logo.png" alt="Bazzez" width="48">
            </div>
        </header>

        <div class="hub-grid" id="hub-grid">
            <!-- JS will populate based on role -->
        </div>
    </div>


    <script src="./js/sidebar-loader.js"></script>
    <script>
        const userRole = localStorage.getItem('role') || 'cashier';
        const isManager = userRole === 'manager';
        const lang = localStorage.getItem('lang') || 'ar';

        const menuItems = [
            { id: 'dashboard', icon: 'fa-chart-line', ar: 'لوحة التحكم', en: 'Dashboard', url: '/dashboard.html', managerOnly: true },
            { id: 'cashier', icon: 'fa-cash-register', ar: 'الكاشير', en: 'Cashier', url: '/cashier.html', managerOnly: false },
            { id: 'orders', icon: 'fa-shopping-basket', ar: 'الطلبات', en: 'Orders', url: '/manage_orders.html', managerOnly: false },
            { id: 'products', icon: 'fa-hamburger', ar: 'المنتجات', en: 'Products', url: '/products.html', managerOnly: true },
            { id: 'inventory', icon: 'fa-boxes', ar: 'المخزن', en: 'Inventory', url: '/inventory.html', managerOnly: true },
            { id: 'discount', icon: 'fa-tags', ar: 'الخصومات', en: 'Discounts', url: '/discount.html', managerOnly: true },
            { id: 'customers', icon: 'fa-users', ar: 'العملاء', en: 'Customers', url: '/customers.html', managerOnly: true },
            { id: 'expenses', icon: 'fa-file-invoice-dollar', ar: 'المصروفات', en: 'Expenses', url: '/expenses.html', managerOnly: false },
            { id: 'analytics', icon: 'fa-chart-pie', ar: 'التحليلات', en: 'Analytics', url: '/analytics.html', managerOnly: true },
            { id: 'daily-closing', icon: 'fa-calendar-day', ar: 'تقفيل اليوم', en: 'Daily Closing', url: '/daily_closing.html', managerOnly: true },
            { id: 'monthly-closing', icon: 'fa-calendar-alt', ar: 'تقفيل الشهر', en: 'Monthly Closing', url: '/monthly_closing.html', managerOnly: true },
            { id: 'merchants', icon: 'fa-handshake', ar: 'حسابات الجملة', en: 'Wholesale Ledger', url: '/merchants.html', managerOnly: true },
            { id: 'users', icon: 'fa-user-tie', ar: 'الموظفين', en: 'Users', url: '/pages/users.html', managerOnly: true },
            { id: 'settings', icon: 'fa-cog', ar: 'الإعدادات', en: 'Settings', url: '/settings.html', managerOnly: true },
            { id: 'logout', icon: 'fa-sign-out-alt', ar: 'تسجيل الخروج', en: 'Logout', url: '#', managerOnly: false, isLogout: true }
        ];

        const grid = document.getElementById('hub-grid');
        menuItems.forEach(item => {
            if (!isManager && item.managerOnly) return;
            
            const a = document.createElement('a');
            a.href = item.url;
            a.className = `hub-item ${item.isLogout ? 'logout-tile' : ''}`;
            a.innerHTML = `
                <div class="icon-bg">
                    <i class="fas ${item.icon}"></i>
                </div>
                <span>${lang === 'ar' ? item.ar : item.en}</span>
            `;
            
            if (item.isLogout) {
                a.onclick = (e) => {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = '/index.html';
                };
            }
            grid.appendChild(a);
        });
    </script>
</body>
</html>
