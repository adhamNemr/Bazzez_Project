<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقفيل اليوم - Vortex POS</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/daily.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        (function() {
            const savedLang = localStorage.getItem('lang') || 'ar';
            document.documentElement.lang = savedLang;
            document.documentElement.dir = (savedLang === 'ar') ? 'rtl' : 'ltr';
        })();
    </script>
</head>
<body>
    <main class="main-content">
        <div id="header-container" data-title="التقفيل اليومي" data-icon="fa-file-invoice-dollar"></div>

        <div class="closing-page">

            <!-- Hero Profit Card -->
            <div class="hero-card">
                <div class="hero-content">
                    <div class="hero-label">صافي الربح النهائي — <span id="current-business-date"></span></div>
                    <div class="hero-value" id="stat-profit">0.00 EGP</div>
                </div>
                <div class="hero-icon"><i class="fas fa-wallet"></i></div>
            </div>

            <!-- Stats Grid (4 Cards) -->
            <div class="stats-grid">
                <!-- Date Picker Card -->
                <div class="stat-card date-picker-card">
                    <div class="card-date-label">تاريخ التقرير</div>
                    <div class="date-picker-wrapper">
                        <input type="text" id="closing-date-input" class="date-picker-input" placeholder="اختر التاريخ">
                        <i class="fas fa-calendar-alt calendar-icon"></i>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-top">
                        <div class="stat-icon-box discount-icon"><i class="fas fa-percentage"></i></div>
                        <div class="stat-meta">
                            <span class="stat-label">إجمالي الخصومات</span>
                            <span class="stat-number" id="stat-discount">0.00 EGP</span>
                        </div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-top">
                        <div class="stat-icon-box expenses-icon"><i class="fas fa-receipt"></i></div>
                        <div class="stat-meta">
                            <span class="stat-label">مصروفات اليوم</span>
                            <span class="stat-number" id="stat-expenses">0.00 EGP</span>
                        </div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-top">
                        <div class="stat-icon-box revenue-icon"><i class="fas fa-cash-register"></i></div>
                        <div class="stat-meta">
                            <span class="stat-label">إجمالي المبيعات</span>
                            <span class="stat-number" id="stat-revenue">0.00 EGP</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detail Cards -->
            <div class="details-split">
                <!-- Cash Breakdown -->
                <div class="detail-card">
                    <h3 class="card-heading">نقدية الخزنة</h3>
                    <div class="data-list">
                        <div class="data-item">
                            <div class="data-left">
                                <div class="item-icon icon-cash"><i class="fas fa-money-bill-wave"></i></div>
                                <div class="data-label">كاش (الدرج)</div>
                            </div>
                            <div class="data-value" id="stat-cash">0.00 EGP</div>
                        </div>
                        <div class="data-item">
                            <div class="data-left">
                                <div class="item-icon icon-digital"><i class="fas fa-credit-card"></i></div>
                                <div class="data-label">دفع إلكتروني</div>
                            </div>
                            <div class="data-value" id="stat-digital">0.00 EGP</div>
                        </div>
                        <div class="data-item total-item">
                            <div class="data-label">إجمالي المحصل</div>
                            <div class="data-value highlight" id="stat-total-cash">0.00 EGP</div>
                        </div>
                    </div>
                </div>

                <!-- Sales Breakdown -->
                <div class="detail-card">
                    <h3 class="card-heading">بيانات المبيعات</h3>
                    <div class="data-list">
                        <div class="data-item">
                            <div class="data-left">
                                <div class="item-icon icon-avg"><i class="fas fa-award"></i></div>
                                <div class="data-label">الأكثر مبيعاً</div>
                            </div>
                            <div class="data-value" id="stat-top-product">لا يوجد</div>
                        </div>
                        <div class="data-item">
                            <div class="data-left">
                                <div class="item-icon icon-items"><i class="fas fa-boxes-stacked"></i></div>
                                <div class="data-label">إجمالي القطع المباعة</div>
                            </div>
                            <div class="data-value" id="stat-items-count">0</div>
                        </div>
                        <div class="data-item">
                            <div class="data-left">
                                <div class="item-icon icon-orders"><i class="fas fa-shopping-bag"></i></div>
                                <div class="data-label">عدد الطلبات (أوردرات)</div>
                            </div>
                            <div class="data-value" id="stat-orders-count">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="action-section">
                <button class="btn-primary" onclick="handleClosing()">
                    <i class="fas fa-lock"></i> إغلاق الوردية واعتماد البيانات
                </button>
                <button class="btn-secondary" onclick="downloadExcelReport()">
                    <i class="fas fa-file-excel"></i> تصدير تقرير إكسيل (Excel)
                </button>
            </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>
    <script src="./js/sidebar-loader.js"></script>
    <script src="./js/header-loader.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/daily_closing.js"></script>
</body>
</html>
