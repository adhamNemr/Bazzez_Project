<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>جاري تشغيل نظام Vortex POS...</h1>
    <p>برجاء الانتظار ثواني معدودة</p>
    <div id="debug" style="margin-top: 20px; color: #888; font-size: 12px;"></div>

    <script>
        // محاولة التحميل التلقائي بعد ثواني
        setTimeout(() => {
            window.location.href = 'http://localhost:8083/index.html';
        }, 3000);
    </script>
</body>
</html>
