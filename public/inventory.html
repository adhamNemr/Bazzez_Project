<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="loc-title">إدارة المخزن - Vortex POS</title>
    
    <!-- 🎨 Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 📄 Stylesheets -->
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/inventory.css">

    <style>
        /* 📊 Stats Row Styles */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 0.25rem; /* Reduced distance to toolbar */
        }

        .header-left, .header-right {
            flex: 1;
        }

        .header-center {
            display: flex;
            justify-content: center;
        }

        .orders-table th, .orders-table td {
            padding: 1.25rem 0.5rem;
            text-align: center !important;
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stat-card {
            background: white;
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 0.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid var(--luxury-border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-height: 140px;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--luxury-emerald);
            opacity: 0.1;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border-color: var(--luxury-emerald);
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .stat-info span {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        /* 🚀 Modal Specific Styles */
        .swal-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .swal-field label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .swal2-input {
            height: 3.5rem !important;
            border-radius: 12px !important;
            border: 1px solid #e2e8f0 !important;
            font-size: 0.95rem !important;
            box-shadow: none !important;
            background: #f8fafc !important;
            margin: 0 !important;
        }

        .swal2-input:focus {
            border-color: var(--luxury-emerald) !important;
            background: white !important;
        }
    </style>
</head>
<body>
    <!-- 🏗️ Dynamic Premium Header -->
    <div id="header-container" data-title="إدارة المخزن" data-icon="fa-warehouse"></div>


    <div class="container">
        <!-- 📊 Quick Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon" style="background: var(--luxury-emerald-light); color: var(--luxury-emerald);">
                    <i class="fas fa-layer-group"></i>
                </div>
                <div class="stat-info">
                    <span id="loc-stat-total">Total Items</span>
                    <h3 id="stat-total-items">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="stat-info">
                    <span id="loc-stat-low">Low Stock</span>
                    <h3 id="stat-low-stock">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
                    <i class="fas fa-hourglass-half"></i>
                </div>
                <div class="stat-info">
                    <span id="loc-stat-expiry">Expiring Soon</span>
                    <h3 id="stat-near-expiry">0</h3>
                </div>
            </div>
        </div>

        <!-- ✨ Optimized Toolbar -->
        <div class="toolbar">
            <form id="add-product-form">
                <!-- 🔍 Row 1: Search & Filter -->
                <div class="search-bar-container">
                    <div class="search-container" style="position:relative; flex:1;">
                        <i class="fas fa-search" id="search-icon" style="position:absolute; right:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
                        <input 
                            type="text" 
                            id="search-input" 
                            class="search-bar" 
                            placeholder="Search..." 
                            onkeyup="applyFilter()" 
                            style="padding-right: 2.5rem; width: 100%;"
                        />
                    </div>
                    <select id="filter-option" class="filter-dropdown" onchange="applyFilter()" style="max-width: 250px;">
                        <option value="all" id="loc-filter-all">All Items</option>
                        <option value="low-stock" id="loc-filter-low">Low Stock</option>
                        <option value="near-expiry" id="loc-filter-expiry">Near Expiry</option>
                    </select>
                </div>
        
                <!-- 📝 Row 2: Inputs -->
                <div class="form-inputs-row" style="margin-top: 1.25rem; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 1rem;">
                    <input type="text" id="product-name" placeholder="Item Name" required />
                    <input type="number" id="product-quantity" placeholder="Quantity" required />
                    <input type="number" id="product-min" placeholder="Min Limit" required />
                    <input type="number" id="product-cost" placeholder="Unit Cost" required />
                    <input type="date" id="product-expiry" required />
                </div>

                <!-- 🚀 Row 3: Add Action Only -->
                <div class="form-actions-row" id="form-actions-container" style="margin-top: 1rem; display: flex; gap: 1rem; width: 100%;">
                    <button type="submit" class="main-button" id="loc-btn-add" style="flex: 1; background: var(--luxury-emerald);">Add Item</button>
                </div>
            </form>
        </div>

        <!-- 📦 Inventory Table Card -->
        <div class="products-card">
            <div class="table-container">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)" id="loc-id">ID</th>
                            <th onclick="sortTable(1)" id="loc-name">Name</th>
                            <th onclick="sortTable(2)" id="loc-qty">Qty (KG/Unit)</th>
                            <th onclick="sortTable(3)" id="loc-min">Min</th>
                            <th onclick="sortTable(4)" id="loc-cost">Unit Cost</th>
                            <th onclick="sortTable(5)" id="loc-total">Total Value</th>
                            <th onclick="sortTable(6)" id="loc-added">Added</th>
                            <th onclick="sortTable(7)" id="loc-expiry">Expiry</th>
                        </tr>
                    </thead>
                    <tbody id="product-table">
                        <!-- Data populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 📊 Footer Actions -->
        <div class="footer">
            <button onclick="exportToPDF()" id="loc-btn-pdf">
                <i class="fas fa-file-pdf"></i>
                <span id="loc-pdf-text">Export PDF</span>
            </button>
            <button onclick="exportToExcel()" id="loc-btn-excel">
                <i class="fas fa-file-excel"></i>
                <span id="loc-excel-text">Export Excel</span>
            </button>
        </div>
    </div>

    <!-- 📚 Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="./js/header-loader.js"></script>
    <script src="./js/inventory.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
