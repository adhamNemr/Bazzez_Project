<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="loc-title">إدارة المخزن - Vortex POS</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/inventory.css">
    <script src="./js/auth-wrapper.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="luxury-workstation">
    
    <!-- 🏗️ Global Sidebar Container -->
    <div id="sidebar-container"></div>

    <div class="main-content">
        <!-- 🏗️ Dynamic Premium Header -->
        <div id="header-container" data-title="إدارة المخزن" data-icon="fa-warehouse"></div>

        <div class="container-fluid">
            
            <!-- 📊 Quick Stats Panel -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <p id="loc-stat-total">إجمالي الأصناف</p>
                        <h3 id="stat-total-items">0</h3>
                    </div>
                    <div class="stat-icon-box emerald">
                        <i class="fas fa-boxes"></i>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-info">
                        <p id="loc-stat-low">نواقص المخزن</p>
                        <h3 id="stat-low-stock">0</h3>
                    </div>
                    <div class="stat-icon-box red">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                </div>

                <div class="stat-card" id="expiry-card">
                    <div class="stat-info">
                        <p id="loc-stat-expiry">قرب الانتهاء</p>
                        <h3 id="stat-near-expiry">0</h3>
                    </div>
                    <div class="stat-icon-box orange">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
                <script>
                    if (localStorage.getItem('systemMode') === 'retail') {
                        document.getElementById('expiry-card').style.display = 'none';
                    }
                </script>
            </div>

            <!-- ✨ Inventory Toolbar -->
            <div class="inventory-toolbar no-print">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="ابحث عن صنف..." onkeyup="applyFilter()">
                </div>
                
                <div class="toolbar-actions">
                    <select id="filter-option" class="luxury-select" onchange="applyFilter()">
                        <option value="all" id="loc-filter-all">كل الأصناف</option>
                        <option value="low-stock" id="loc-filter-low">النواقص</option>
                        <option value="near-expiry" id="loc-filter-expiry">قرب الانتهاء</option>
                    </select>

                    <button class="btn-add-item" onclick="openAddModal()">
                        <i class="fas fa-plus"></i>
                        <span id="loc-btn-add">إضافة صنف جديد</span>
                    </button>
                </div>
            </div>

            <!-- 📦 Inventory Table Card -->
            <div class="table-card">
                <div class="table-container">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th id="loc-id">ID</th>
                                <th id="loc-name">اسم الصنف</th>
                                <th id="loc-qty">الكمية</th>
                                <th id="loc-min">الحد الأدنى</th>
                                <th id="loc-cost">التكلفة</th>
                                <th id="loc-price" style="color: var(--luxury-emerald);">سعر البيع</th>
                                <th id="loc-total">إجمالي القيمة</th>
                                <th id="loc-added">آخر تحديث</th>
                        <th id="loc-expiry" class="expiry-col">تاريخ الصلاحية</th>
                        <script>
                            if (localStorage.getItem('systemMode') === 'retail') {
                                document.getElementById('loc-expiry').style.display = 'none';
                                document.getElementById('loc-filter-expiry').style.display = 'none';
                            }
                        </script>
                            </tr>
                        </thead>
                        <tbody id="product-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- 📥 Export Footer -->
            <div class="page-footer no-print">
                <button onclick="exportToExcel()" class="btn-export-excel">
                    <span id="loc-excel-text">تصدير إكسل</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 📜 Scripts -->
    <script src="./js/sidebar-loader.js"></script>
    <script src="./js/header-loader.js"></script>
    <script src="./js/inventory.js"></script>
</body>
</html>
