<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - Vortex POS</title>
    <script src="./js/auth-wrapper.js"></script>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>
    <script>
        // 🚀 Blocking Script to prevent Layout Shift (FOUC/FOWD)
        (function() {
            const savedLang = localStorage.getItem('lang') || 'ar';
            document.documentElement.lang = savedLang;
            document.documentElement.dir = (savedLang === 'ar') ? 'rtl' : 'ltr';
            // Also apply to body if needed early
            document.addEventListener('DOMContentLoaded', () => {
                document.body.dir = (savedLang === 'ar') ? 'rtl' : 'ltr';
            });
        })();
    </script>
    <link rel="stylesheet" href="./css/manage_orders.css">
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <!-- 🏗️ Dynamic Premium Header -->
        <div id="header-container" data-title="إدارة الطلبات" data-icon="fa-list-alt"></div>

        <div class="orders-page">

            <div class="orders-card">
                <div class="orders-tabs">
                    <div class="tabs-list">
                        <div class="tab-item active" data-filter="all">
                            <span class="tab-text">الكل</span>
                            <span class="tab-count" id="count-all">-</span>
                        </div>
                        <div class="tab-item" data-filter="Paid">
                            <span class="tab-text">أونلاين</span>
                            <span class="tab-count" id="count-paid">-</span>
                        </div>
                        <div class="tab-item" data-filter="Pending">
                            <span class="tab-text">نقدي</span>
                            <span class="tab-count" id="count-pending">-</span>
                        </div>
                        <div class="tab-item" data-filter="cancelled">
                            <span class="tab-text">ملغي</span>
                            <span class="tab-count" id="count-cancelled">-</span>
                        </div>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" class="search-input" id="order-search" placeholder="ابحث برقم الطلب أو اسم العميل...">
                    </div>

                    <div class="date-filter-container">
                        <i class="fas fa-calendar-alt" style="color: var(--primary); font-size: 0.9rem;"></i>
                        <input type="text" class="date-input" id="date-filter" placeholder="اختر التاريخ" readonly>
                        <button class="btn-clear-date" id="clear-date-btn" title="الرجوع لطلبات اليوم">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>

                    <div class="filter-stats">
                        <div class="stat-item">
                            <i class="fas fa-info-circle"></i>
                            <span id="today-total-label">إجمالي طلبات وردية العمل:</span> <span id="today-count" style="font-weight: 800; color: var(--primary);">-</span>
                        </div>
                        <button class="btn-refresh-inline" onclick="fetchOrders()" id="refresh-btn-text" style="margin-right: 1rem; border-left: 1px solid #e2e8f0; padding-right: 1rem;">
                            <i class="fas fa-sync-alt"></i> تحديث
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>الطلب</th>
                                <th>التاريخ</th>
                                <th>العميل</th>
                                <th>الإجمالي</th>
                                <th>حالة الدفع</th>
                                <th>التوصيل</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body">
                            <!-- 🧪 Initial Skeleton State -->
                            <tr><td><div class="skeleton" style="width:50px; height:20px;"></div></td><td><div class="skeleton" style="width:100px; height:20px;"></div></td><td><div class="skeleton" style="width:150px; height:20px;"></div></td><td><div class="skeleton" style="width:80px; height:20px;"></div></td><td><div class="skeleton" style="width:70px; height:20px;"></div></td><td><div class="skeleton" style="width:90px; height:20px;"></div></td><td><div class="skeleton" style="width:60px; height:20px;"></div></td></tr>
                            <tr><td><div class="skeleton" style="width:50px; height:20px;"></div></td><td><div class="skeleton" style="width:100px; height:20px;"></div></td><td><div class="skeleton" style="width:150px; height:20px;"></div></td><td><div class="skeleton" style="width:80px; height:20px;"></div></td><td><div class="skeleton" style="width:70px; height:20px;"></div></td><td><div class="skeleton" style="width:90px; height:20px;"></div></td><td><div class="skeleton" style="width:60px; height:20px;"></div></td></tr>
                            <tr><td><div class="skeleton" style="width:50px; height:20px;"></div></td><td><div class="skeleton" style="width:100px; height:20px;"></div></td><td><div class="skeleton" style="width:150px; height:20px;"></div></td><td><div class="skeleton" style="width:80px; height:20px;"></div></td><td><div class="skeleton" style="width:70px; height:20px;"></div></td><td><div class="skeleton" style="width:90px; height:20px;"></div></td><td><div class="skeleton" style="width:60px; height:20px;"></div></td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- 📄 Pagination Controls -->
                <div class="pagination-container">
                    <button class="pagination-btn" id="prev-page" disabled>
                        <i class="fas fa-chevron-right"></i> السابق
                    </button>
                    <span class="pagination-info" id="page-info">صفحة 1 من 1</span>
                    <button class="pagination-btn" id="next-page" disabled>
                        التالي <i class="fas fa-chevron-left"></i>
                    </button>
                </div>
            </div>

            <!-- 📊 Footer Actions -->
            <div class="footer" style="margin-top: 1.5rem;">
                <button onclick="exportOrdersToExcel()" class="btn-excel-full" id="loc-btn-excel">
                    <i class="fas fa-file-excel"></i>
                    <span>تصدير الطلبات (Excel)</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Order Details Sidebar -->
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="order-details-sidebar" id="details-sidebar">
        <div class="sidebar-header">
            <h3>تفاصيل الطلب <span id="side-order-id" style="color: var(--primary); font-family: monospace;">#1001</span></h3>
            <button class="close-sidebar-btn" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="sidebar-content">
            <!-- 🏷️ Items Card -->
            <div class="info-card">
                <h4><i class="fas fa-utensils"></i> الأصناف</h4>
                <div id="side-items-list"></div>
            </div>

            <!-- 👤 Customer Card -->
            <div class="info-card">
                <h4><i class="fas fa-user-circle"></i> بيانات العميل</h4>
                <div class="customer-detail">
                    <i class="fas fa-user"></i>
                    <span id="side-customer-name"></span>
                </div>
                <div class="customer-detail">
                    <i class="fas fa-phone-alt"></i>
                    <span id="side-customer-phone"></span>
                </div>
                <div class="customer-detail">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="side-customer-address" style="font-size: 0.85rem; opacity: 0.8;"></span>
                </div>
            </div>

            <!-- 💳 Payment Status Card -->
            <div class="info-card">
                <h4><i class="fas fa-credit-card"></i> حالة الدفع</h4>
                <div id="side-payment-status"></div>
            </div>

            <!-- 🧾 Receipt Style Card -->
            <div class="receipt-card">
                <div class="receipt-row">
                    <span>السعر:</span>
                    <span id="side-subtotal"></span>
                </div>
                <div class="receipt-row">
                    <span data-i18n="sidebarVat">القيمة المضافة:</span>
                    <span id="side-vat"></span>
                </div>
                <div class="receipt-row">
                    <span>خدمة التوصيل:</span>
                    <span id="side-delivery"></span>
                </div>
                <div class="receipt-row" style="color: #ef4444; font-weight: 700;">
                    <span data-i18n="sidebarDiscount">الخصم:</span>
                    <span id="side-discount"></span>
                </div>
                <div class="receipt-divider"></div>
                <div class="receipt-total">
                    <span class="total-label">الإجمالي النهائي:</span>
                    <span id="side-total"></span>
                </div>
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="btn btn-print" id="print-receipt-btn"><i class="fas fa-print"></i> طباعة فاتورة</button>
            <button class="btn btn-cancel" id="cancel-order-btn"><i class="fas fa-ban"></i> إلغاء الطلب</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/header-loader.js"></script>
    <script src="./js/sidebar-loader.js"></script>
    <script src="./js/manage_orders.js?v=2.0"></script>
</body>
</html>
