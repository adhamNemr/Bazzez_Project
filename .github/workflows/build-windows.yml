name: Build Windows App

on:
  push:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create .env File
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "PRINTER_TYPE=${{ secrets.PRINTER_TYPE }}" >> .env
          echo "PRINTER_INTERFACE=${{ secrets.PRINTER_INTERFACE }}" >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_IP=${{ secrets.SUPABASE_IP }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App (Windows)
        run: npm run dist:win

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-POS-Windows-Portable
          path: dist/*.exe
          retention-days: 30